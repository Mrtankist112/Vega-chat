<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V.E.G.A Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="stars"></canvas>
    
    <div class="app-container" id="appContainer">
        <header class="chat-header">
            <div class="header-left">
                <div class="update-indicator" id="updateIndicator" style="display: none;">
                    <span class="update-icon">🔄</span>
                    <span class="update-text" id="updateText"></span>
                </div>
            </div>
            
            <div class="header-center">
                <div class="agent-status" id="agentStatus">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span class="status-text" id="agentName">V.E.G.A</span>
                </div>
                <div class="connection-info" id="connectionInfo"></div>
            </div>
            
            <div class="header-right">
                <button id="settingsBtn" class="settings-btn" title="Настройки агента">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"/>
                        <path d="M19.4 15C18.9 16 18.1 16.7 17.2 17.2L19 20.6L16 21L15.2 18.2C14.3 18.5 13.3 18.6 12.3 18.6C11.3 18.6 10.3 18.5 9.4 18.2L8.6 21L5.6 20.6L7.4 17.2C6.5 16.7 5.7 16 5.2 15L2 15L2 12L5.2 12C5.1 11.3 5.1 10.7 5.2 10L2 10L2 7L5.2 7C5.7 6 6.5 5.3 7.4 4.8L5.6 1.4L8.6 1L9.4 3.8C10.3 3.5 11.3 3.4 12.3 3.4C13.3 3.4 14.3 3.5 15.2 3.8L16 1L19 1.4L17.2 4.8C18.1 5.3 18.9 6 19.4 7L22 7L22 10L19.4 10C19.5 10.7 19.5 11.3 19.4 12L22 12L22 15L19.4 15Z"/>
                    </svg>
                </button>
                <button id="minimizeBtn" class="window-btn minimize-btn" title="Свернуть">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M20 12H4" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <button id="closeBtn" class="window-btn close-btn" title="Закрыть">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M18 6L6 18M6 6L18 18" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Панель настроек агента -->
        <div id="agentPanel" class="agent-panel hidden">
            <div class="panel-header">
                <h3>🔧 Настройки агента</h3>
                <button id="closePanelBtn" class="close-btn">✕</button>
            </div>
            <div class="panel-content">
                <div class="input-group">
                    <label>Адрес агента:</label>
                    <div class="url-input">
                        <span class="url-prefix">http://</span>
                        <input type="text" id="agentHost" placeholder="localhost" value="localhost">
                        <span class="url-separator">:</span>
                        <input type="number" id="agentPort" placeholder="5000" value="5000" min="1" max="65535">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Тип подключения:</label>
                    <select id="connectionType">
                        <option value="http" selected>HTTP</option>
                        <option value="https">HTTPS</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Таймаут (сек):</label>
                    <input type="number" id="timeout" value="5" min="1" max="30">
                </div>

                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="autoConnect" checked>
                        Автоподключение при запуске
                    </label>
                </div>

                <div class="test-connection">
                    <button id="testConnectionBtn" class="test-btn">🔍 Проверить подключение</button>
                    <span id="testResult" class="test-result"></span>
                </div>

                <div class="panel-actions">
                    <button id="saveAgentBtn" class="save-btn">💾 Сохранить</button>
                    <button id="resetAgentBtn" class="reset-btn">↺ Сбросить</button>
                </div>
            </div>
        </div>

        <!-- Панель информации о версии и обновлениях -->
        <div id="versionPanel" class="version-panel hidden">
            <div class="version-header">
                <h3>ℹ️ О программе</h3>
                <button id="closeVersionBtn" class="close-btn">✕</button>
            </div>
            <div class="version-content">
                <div class="app-icon">🤖</div>
                <div class="app-name">V.E.G.A Chat</div>
                <div class="app-version" id="currentVersion">Версия 1.0.0</div>
                
                <div class="update-check">
                    <button id="checkUpdateBtn" class="update-check-btn">🔍 Проверить обновления</button>
                </div>
                
                <div id="updateInfo" class="update-info hidden">
                    <div class="update-status" id="updateStatus"></div>
                    <div class="update-progress-bar hidden" id="updateProgressBar">
                        <div class="progress-track">
                            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                        </div>
                        <div class="progress-text" id="progressText">0%</div>
                    </div>
                    <button id="downloadUpdateBtn" class="download-update-btn hidden">📥 Скачать обновление</button>
                    <button id="installUpdateBtn" class="install-update-btn hidden">🔄 Установить сейчас</button>
                </div>
                
                <div class="version-divider"></div>
                
                <div class="app-info">
                    <p><strong>Разработчик:</strong> V.E.G.A</p>
                    <p><strong>Год выпуска:</strong> 2026</p>
                    <p><strong>Лицензия:</strong> MIT</p>
                    <p><strong>Репозиторий:</strong> <a href="#" id="repoLink">github.com/vega/chat</a></p>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-container">
            <textarea 
                id="messageInput" 
                placeholder="Напишите сообщение..." 
                rows="1"
            ></textarea>
            <button id="sendButton" class="send-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="assets/background-animations.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
